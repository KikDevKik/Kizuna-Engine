steps:
  # Step 1: docker build
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/kizuna-engine', '.']

  # Step 2: docker push
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/kizuna-engine']

  # Step 3: gcloud run deploy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'kizuna-engine'
      - '--image'
      - 'gcr.io/$PROJECT_ID/kizuna-engine'
      - '--region'
      - 'asia-northeast1'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--timeout'
      - '3600'
      - '--session-affinity'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '10'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      # The environment variables are set as secrets in Cloud Run, do not hardcode them.
      - '--set-secrets'
      - 'FIREBASE_CREDENTIALS=firebase-credentials:latest,GOOGLE_APPLICATION_CREDENTIALS=google-application-credentials:latest,NEO4J_URI=neo4j-uri:latest,NEO4J_USERNAME=neo4j-username:latest,NEO4J_PASSWORD=neo4j-password:latest,GEMINI_API_KEY=gemini-api-key:latest'

images:
  - 'gcr.io/$PROJECT_ID/kizuna-engine'
